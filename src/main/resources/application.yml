spring:
  application:
    name: my-portfolio
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:25MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.portfolio.project.domain
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${PORT:8080}

vercel:
  deploy-hook-url: ${VERCEL_DEPLOY_HOOK_URL:}

portfolio:
  admin-username: ${PORTFOLIO_ADMIN_USERNAME:ssh}
  admin-password: ${PORTFOLIO_ADMIN_PASSWORD:ssh}

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:}
      model-name: gpt-4o-mini
    embedding-model:
      api-key: ${OPENAI_API_KEY:}
      model-name: text-embedding-3-small

pinecone:
  api-key: ${PINECONE_API_KEY:}
  index-name: ${PINECONE_INDEX_NAME:}
